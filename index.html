<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>⚡ Rapid Business Contact ⚡</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%233b82f6'/><text x='50' y='58' font-size='60' text-anchor='middle' dominant-baseline='middle'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--accent:#3b82f6;--gold:#f59e0b;--green:#22c55e;--text:#fff;--text2:#aaa;--text3:#666;--radius:16px;--locked:#333}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:480px;margin:0 auto;padding:16px;min-height:100vh}

/* Mode Toggle */
.mode-toggle{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:20px}
.mode-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--text3);background:transparent}
.mode-btn.active{background:var(--accent);color:#fff}

/* Section Cards */
.section{border-radius:var(--radius);overflow:hidden;margin-bottom:12px;transition:all 0.3s}
.section.locked{opacity:0.4;pointer-events:none;filter:grayscale(0.5)}
.section.locked .section-header::after{content:'🔒';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px}
.section.completed .section-header::after{content:'✅';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px}
.section-header{position:relative;padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.2s}
.section-header:hover{filter:brightness(1.1)}
.section-icon{font-size:20px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-title{font-weight:700;font-size:15px;letter-spacing:-0.3px}
.section-subtitle{font-size:11px;color:var(--text2);margin-top:2px}
.section-body{padding:0 20px 20px;display:none}
.section.open .section-body{display:block}

/* Card Section */
.s-card .section-header{background:linear-gradient(135deg,#1e3a5f,#0d1b2a)}
.s-card .section-icon{background:rgba(59,130,246,0.2)}
/* Offer Section */
.s-offer .section-header{background:linear-gradient(135deg,#5b2100,#2a1000)}
.s-offer .section-icon{background:rgba(245,158,11,0.2)}
/* Follow Section */
.s-follow .section-header{background:linear-gradient(135deg,#1a0a3e,#2d1b69)}
.s-follow .section-icon{background:rgba(139,92,246,0.2)}
/* Reviews Section */
.s-reviews .section-header{background:linear-gradient(135deg,#1a4731,#0a1f14)}
.s-reviews .section-icon{background:rgba(34,197,94,0.2)}
/* Text Club Section */
.s-textclub .section-header{background:linear-gradient(135deg,#4a1942,#2d1025)}
.s-textclub .section-icon{background:rgba(236,72,153,0.2)}

/* Form Elements */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-input{width:100%;padding:12px 14px;background:var(--card);border:1px solid #333;border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;transition:border 0.2s}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:60px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* Upload */
.upload-zone{border:2px dashed #333;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--accent);background:rgba(59,130,246,0.05)}
.upload-zone img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 8px}
.upload-zone .upload-text{font-size:13px;color:var(--text2)}
.upload-zone .upload-text span{color:var(--accent);font-weight:600}

/* Buttons */
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-gold{background:var(--gold);color:#000}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:transparent;color:var(--text2);border:1px solid #333}

/* Social Chips */
.social-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.social-chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #333;background:var(--card);color:var(--text2);transition:all 0.2s}
.social-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,0.1)}

/* Customer View */
.customer-section{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.customer-section h3{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.quick-actions{display:flex;justify-content:center;gap:16px;margin:16px 0}
.quick-action{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--text)}
.quick-action .qa-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform 0.2s}
.quick-action:active .qa-icon{transform:scale(0.9)}
.quick-action span{font-size:10px;color:var(--text2)}

/* Offer Card */
.offer-display{background:linear-gradient(135deg,#f59e0b22,#f59e0b08);border:1px solid #f59e0b33;border-radius:14px;padding:20px;text-align:center}
.offer-display .offer-title{font-size:20px;font-weight:800;color:var(--gold)}
.offer-display .offer-sub{font-size:13px;color:var(--text2);margin-top:4px}
.offer-display .offer-btn{margin-top:16px;display:inline-block;padding:12px 28px;background:var(--gold);color:#000;font-weight:700;border-radius:12px;border:none;font-family:inherit;font-size:14px;cursor:pointer}

/* Platform Buttons */
.platform-btn{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card2);border-radius:12px;margin-bottom:8px;cursor:pointer;border:none;width:100%;color:var(--text);font-family:inherit;transition:all 0.2s;text-decoration:none}
.platform-btn:active{transform:scale(0.98)}
.platform-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.platform-name{font-weight:600;font-size:14px}
.platform-sub{font-size:11px;color:var(--text3)}

/* QR Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(10px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:24px;padding:32px;text-align:center;max-width:320px;width:90%}
.modal h3{color:#000;font-size:18px;margin-bottom:4px}
.modal p{color:#666;font-size:12px;margin-bottom:16px}
.modal canvas{border-radius:12px}
.modal-close{margin-top:16px;padding:10px 32px;border:none;background:#000;color:#fff;border-radius:10px;font-family:inherit;font-weight:600;cursor:pointer}

.powered-by{text-align:center;padding:20px 0 30px;font-size:11px;color:#333}
.powered-by a{color:#555;text-decoration:none}

/* Claim Modal */
.claim-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(10px)}
.claim-overlay.active{display:flex}
.claim-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.claim-sheet h3{font-size:18px;font-weight:800;margin-bottom:4px}
.claim-sheet .claim-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
</style>
</head>
<body>

<div class="container" id="app"></div>

<div class="modal-overlay" id="qrOverlay" onclick="closeQR()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="qrTitle">Scan to Connect</h3>
    <p>Point your camera at the code</p>
    <canvas id="qrCanvas"></canvas>
    <br><button class="modal-close" onclick="closeQR()">Done</button>
  </div>
</div>

<div class="claim-overlay" id="claimOverlay" onclick="closeClaim()">
  <div class="claim-sheet" onclick="event.stopPropagation()" id="claimSheet"></div>
</div>

<script>
// ===== STATE =====
const S = {
  mode: 'builder', // builder or customer
  step: 0, // 0=card, 1=offer, 2=follow, 3=reviews, 4=textclub
  completed: new Set(),
  data: {
    // Card
    cardType: 'business',
    name: '', phone: '', email: '', address: '', website: '', tagline: '',
    logo: null, logoUrl: '',
    // Offer
    offerTitle: '', offerDesc: '', offerExpiry: '', offerExemptions: '',
    // Follow
    socials: {},
    // Reviews
    reviewPlatforms: {
      facebook: { enabled: true, url: '' },
      yelp: { enabled: true, url: '' },
      google: { enabled: false, url: '' },
    },
    // Colors
    accentColor: '#3b82f6',
  },
  slug: generateSlug(),
};

function generateSlug() {
  return Math.random().toString(36).slice(2,8);
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  if (S.mode === 'builder') {
    app.innerHTML = renderBuilder();
  } else {
    app.innerHTML = renderCustomer();
  }
}

function renderBuilder() {
  const sections = [
    { key: 'card', icon: '📇', title: 'Business Card', sub: 'Your info, logo & contact details', cls: 's-card' },
    { key: 'offer', icon: '🎁', title: 'Special Offer', sub: 'Create a deal to attract customers', cls: 's-offer' },
    { key: 'follow', icon: '📱', title: 'Follow Us', sub: 'Social media links', cls: 's-follow' },
    { key: 'reviews', icon: '⭐', title: 'Leave a Review', sub: 'Review platform setup', cls: 's-reviews' },
    { key: 'textclub', icon: '📲', title: 'Text Club', sub: 'VIP customer list (upgrade)', cls: 's-textclub' },
  ];

  let html = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px">⚡ Rapid Business Contact ⚡</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">One link. One tap. Your entire business.</div>
      <button onclick="showExamples()" style="margin-top:8px;background:transparent;border:1px solid #333;color:var(--text2);padding:8px 16px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer">👁 See Examples</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('builder')">⚡ Builder</button>
      <button class="mode-btn" onclick="setMode('customer')">👁 Preview</button>
    </div>
  `;

  sections.forEach((sec, i) => {
    const isLocked = i > 0 && !S.completed.has(sections[i-1].key);
    const isCompleted = S.completed.has(sec.key);
    const isOpen = S.step === i && !isLocked;
    const cls = [
      'section', sec.cls,
      isLocked ? 'locked' : '',
      isCompleted ? 'completed' : '',
      isOpen ? 'open' : '',
    ].filter(Boolean).join(' ');

    html += `<div class="${cls}">
      <div class="section-header" onclick="${isLocked ? '' : `toggleSection(${i})`}">
        <div class="section-icon">${sec.icon}</div>
        <div>
          <div class="section-title">${sec.title}</div>
          <div class="section-subtitle">${sec.sub}</div>
        </div>
      </div>
      <div class="section-body" onclick="event.stopPropagation()">${renderSectionBody(sec.key)}</div>
    </div>`;
  });

  // Share bar
  if (S.completed.size > 0) {
    html += `
      <div style="margin-top:20px;padding:20px;background:var(--card);border-radius:var(--radius);text-align:center">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Your link:</div>
        <div style="font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px">rbc.autorephero.com/${S.slug}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="showQR('https://rbc.autorephero.com/${S.slug}','${S.data.name||"My Business"}')">📱 QR Code</button>
          <button class="btn btn-outline" onclick="shareLink()">📤 Share</button>
          <button class="btn btn-green" onclick="saveContact()">📇 Save Contact</button>
        </div>
      </div>
    `;
  }

  html += `<div class="powered-by">Powered by <a href="https://autorephero.com">AutoRepHero</a> ⚡</div>`;
  return html;
}

function renderSectionBody(key) {
  switch(key) {
    case 'card': return `
      <div style="position:relative;margin-bottom:14px">
        <input class="form-input" placeholder="🔍 Search your business name..." oninput="searchBiz(this.value)" autocomplete="off" style="padding-left:14px">
        <div id="searchResults" style="display:none;background:var(--card);border:1px solid #333;border-radius:12px;max-height:200px;overflow-y:auto;margin-top:4px"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px"><div style="flex:1;height:1px;background:#333"></div>or enter manually<div style="flex:1;height:1px;background:#333"></div></div>
      <div class="form-group">
        <label>Card Type</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['🔧 Business','👤 Personal','⛪ Church','🏢 Organization','🏠 Realtor'].map(t => {
            const val = t.split(' ').pop().toLowerCase();
            return `<button class="social-chip ${S.data.cardType===val?'active':''}" onclick="S.data.cardType='${val}';render();S.step=0;render()" style="font-size:13px;padding:10px 14px">${t}</button>`;
          }).join('')}
        </div>
      </div>
      <div class="upload-zone" onclick="document.getElementById('logoInput').click()" id="uploadZone">
        ${S.data.logoUrl ? `<img src="${S.data.logoUrl}" alt="Logo">` : ''}
        <div class="upload-text">${S.data.logoUrl ? 'Tap to change' : '📸 <span>Add your logo or photo</span><br>Shows up when customers save your contact'}</div>
        <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogo(this)">
      </div>
      <div class="form-group" style="margin-top:14px"><label>${{'personal':'Your Name','church':'Church / Organization Name','organization':'Organization Name','realtor':'Your Name'}[S.data.cardType] || 'Business Name'}</label><input class="form-input" placeholder="${{'personal':'John Smith','church':'Grace Community Church','organization':'Spokane Rotary Club','realtor':'Jane Smith, Realtor'}[S.data.cardType] || "Joe's Plumbing"}" value="${S.data.name}" oninput="S.data.name=this.value"></div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input class="form-input" placeholder="(509) 555-1234" value="${S.data.phone}" oninput="S.data.phone=this.value"></div>
        <div class="form-group"><label>Email</label><input class="form-input" placeholder="you@email.com" value="${S.data.email}" oninput="S.data.email=this.value"></div>
      </div>
      <div class="form-group"><label>Address</label><input class="form-input" placeholder="123 Main St, Spokane, WA" value="${S.data.address}" oninput="S.data.address=this.value"></div>
      <div class="form-group"><label>Website</label><input class="form-input" placeholder="https://yourbusiness.com" value="${S.data.website}" oninput="S.data.website=this.value"></div>
      <div class="form-group"><label>Tagline</label><input class="form-input" placeholder="Fast, honest service you can trust" value="${S.data.tagline}" oninput="S.data.tagline=this.value"></div>
      <button class="btn btn-primary" onclick="saveFormValues();if(!S.data.name){alert('Please enter a business name');return;}completeSection('card')">✅ Save Card & Continue</button>
    `;
    case 'offer': return `
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">✨ Select a suggestion or create your own:</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${[
          {type:'plumber',label:'🔧 Plumber',h:'$50 Off Any Plumbing Repair',d:'Leaks, clogs, water heaters. Licensed & insured. Same-day service.'},
          {type:'roofer',label:'🏠 Roofer',h:'Free Roof Inspection + 10% Off',d:'We inspect at no charge. If repairs needed, save 10%.'},
          {type:'auto',label:'🚗 Auto',h:'$25 Off Your Next Oil Change',d:'Full synthetic included. Free multi-point inspection with every service.'},
          {type:'restaurant',label:'🍕 Restaurant',h:'Buy One Entree, Get One Free!',d:'Dine in only. Second entree of equal or lesser value.'},
          {type:'salon',label:'✂️ Salon',h:'20% Off Your First Visit',d:'Haircuts, color, styling. New clients only.'},
          {type:'realtor',label:'🏡 Realtor',h:'Free Home Value Report',d:'Find out what your home is worth. No obligation.'},
          {type:'carlot',label:'🚙 Car Lot',h:'Free Vehicle History Report',d:'No commitment. Know exactly what you are buying.'},
          {type:'retail',label:'🛍️ Retail',h:'Buy 2, Get 1 Free!',d:'Mix and match. Free item equal or lesser value.'},
          {type:'church',label:'⛪ Church',h:'Free Welcome Gift',d:'Join us this Sunday and receive a special welcome gift.'},
          {type:'other',label:'💼 Other',h:'15% Off Your First Service',d:'We want to earn your business. Book today and save!'},
        ].map(o => `<button class="social-chip" onclick="S.data.offerTitle='${o.h.replace(/'/g,"\\'")}';S.data.offerDesc='${o.d.replace(/'/g,"\\'")}';render();S.step=1;render()" style="font-size:11px;padding:8px 12px">${o.label}</button>`).join('')}
      </div>
      <div class="form-group"><label>Offer Headline</label><input class="form-input" placeholder="$50 Off First Service" value="${S.data.offerTitle}" oninput="S.data.offerTitle=this.value"></div>
      <div class="form-group"><label>Details</label><textarea class="form-input" placeholder="Describe your offer..." oninput="S.data.offerDesc=this.value">${S.data.offerDesc}</textarea></div>
      <div class="form-group"><label>Expires (optional)</label><input class="form-input" placeholder="e.g. April 30, 2026 or While supplies last" value="${S.data.offerExpiry}" oninput="S.data.offerExpiry=this.value"></div>
      <div class="form-group"><label>Exemptions (optional)</label><textarea class="form-input" placeholder="e.g. Cannot combine with other offers. New customers only. One per household." oninput="S.data.offerExemptions=this.value">${S.data.offerExemptions||''}</textarea></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" onclick="saveFormValues();completeSection('offer')">🎁 Save Offer & Continue</button>
        <button class="btn btn-outline" onclick="skipSection('offer')" style="flex:0.4">Skip</button>
      </div>
    `;
    case 'follow': return `
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Select your platforms and add your links:</p>
      ${['Facebook','Instagram','YouTube','TikTok','LinkedIn','Twitter/X'].map(p => {
        const key = p.toLowerCase().replace('/','');
        const active = S.data.socials[key];
        return `<div style="margin-bottom:10px">
          <div class="social-chip ${active !== undefined ? 'active' : ''}" onclick="toggleSocial('${key}')" style="display:inline-block;margin-bottom:6px">${p}</div>
          ${active !== undefined ? `<input class="form-input" placeholder="Your ${p} URL" value="${active||''}" oninput="S.data.socials['${key}']=this.value" style="margin-top:4px">` : ''}
        </div>`;
      }).join('')}
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn btn-primary" onclick="completeSection('follow')" style="background:#8b5cf6">📱 Save Socials & Continue</button>
        <button class="btn btn-outline" onclick="skipSection('follow')" style="flex:0.4">Skip</button>
      </div>
    `;
    case 'reviews': return `
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Add your review page URLs:</p>
      ${Object.entries(S.data.reviewPlatforms).map(([k,v]) => `
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;min-width:90px">
            <input type="checkbox" ${v.enabled?'checked':''} onchange="S.data.reviewPlatforms['${k}'].enabled=this.checked;render()">
            <span style="font-size:13px;font-weight:600;text-transform:capitalize">${k}</span>
          </label>
          ${v.enabled ? `<input class="form-input" placeholder="${k} review URL" value="${v.url}" oninput="S.data.reviewPlatforms['${k}'].url=this.value" style="flex:1">` : ''}
        </div>
      `).join('')}
      <button class="btn btn-green" onclick="completeSection('reviews')">⭐ Save Reviews & Finish</button>
    `;
    case 'textclub': return `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:40px;margin-bottom:8px">📲</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:4px">Text Club — Coming Soon</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Build a VIP customer list. Send exclusive deals directly to their phone.</div>
        <button class="btn btn-outline" disabled>🔒 Upgrade to Unlock</button>
      </div>
    `;
  }
}

function renderCustomer() {
  const d = S.data;
  let html = '';

  // Header
  html += `<div style="text-align:center;padding:20px 0 10px">
    ${d.logoUrl ? `<div style="position:relative;width:80px;height:80px;margin:0 auto 10px">
      <img src="${d.logoUrl}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--card2)">

  </div>`;

  html += `<div class="powered-by">Powered by <a href="https://autorephero.com">AutoRepHero</a> ⚡</div>`;
  return html;
}

// ===== ACTIONS =====
function setMode(m) {
  S.mode = m;
  render();
}

function toggleSection(i) {
  S.step = S.step === i ? -1 : i;
  render();
}

function saveFormValues() {
  // Grab current input values from DOM before re-render
  const fields = {name:'b_name',phone:'b_phone',email:'b_email',address:'b_address',website:'b_website',tagline:'b_tagline',offerTitle:'b_offerTitle',offerDesc:'b_offerDesc',offerExpiry:'b_offerExpiry'};
  Object.entries(fields).forEach(([key, id]) => {
    const el = document.querySelector(`[oninput*="S.data.${key}"]`);
    if (el) S.data[key] = el.value;
  });
}

function completeSection(key) {
  saveFormValues();
  S.completed.add(key);
  const order = ['card','offer','follow','reviews','textclub'];
  const idx = order.indexOf(key);
  if (idx < order.length - 1) S.step = idx + 1;
  render();
}

function skipSection(key) {
  completeSection(key);
}

function toggleSocial(key) {
  if (S.data.socials[key] !== undefined) {
    delete S.data.socials[key];
  } else {
    S.data.socials[key] = '';
  }
  render();
}

function handleLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    S.data.logoUrl = e.target.result;
    render();
  };
  reader.readAsDataURL(file);
}

function showQR(url, name) {
  document.getElementById('qrTitle').textContent = name;
  document.getElementById('qrOverlay').classList.add('active');
  QRCode.toCanvas(document.getElementById('qrCanvas'), url, { width: 220, margin: 2, color: { dark: '#000', light: '#fff' } });
}
function closeQR() { document.getElementById('qrOverlay').classList.remove('active'); }

function shareLink() {
  const url = `https://rbc.autorephero.com/${S.slug}`;
  if (navigator.share) {
    navigator.share({ title: S.data.name || 'My Business', text: 'Check out ' + (S.data.name || 'my business'), url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
  }
}

function generateBoltIcon() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 256, 256);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#1d4ed8');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(128, 128, 128, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = '120px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', 128, 138);
  return c.toDataURL('image/png');
}

function addBoltWatermark(imgSrc) {
  return new Promise((resolve) => {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    const img = new Image();
    img.onload = () => {
      // Draw the uploaded image as circle
      ctx.beginPath();
      ctx.arc(128, 128, 128, 0, Math.PI * 2);
      ctx.clip();
      const size = Math.min(img.width, img.height);
      const sx = (img.width - size) / 2;
      const sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 256, 256);
      // Bolt watermark — bottom right
      ctx.restore();
      ctx.beginPath();
      ctx.arc(210, 210, 36, 0, Math.PI * 2);
      const grad = ctx.createLinearGradient(174, 174, 246, 246);
      grad.addColorStop(0, '#3b82f6');
      grad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = '#0a0a0a';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.font = '32px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', 210, 213);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => resolve(generateBoltIcon());
    img.src = imgSrc;
  });
}

async function saveContact() {
  const d = S.data;
  let photoDataUrl;
  if (d.logoUrl) {
    photoDataUrl = await addBoltWatermark(d.logoUrl);
  } else {
    photoDataUrl = generateBoltIcon();
  }
  const photoData = photoDataUrl.split(',')[1];
  const photoType = 'PNG';
  const vcard = [
    'BEGIN:VCARD','VERSION:3.0',
    'FN:' + (d.name || 'Business'),
    'ORG:' + (d.name || ''),
    d.phone ? 'TEL;TYPE=WORK:' + d.phone : '',
    d.email ? 'EMAIL:' + d.email : '',
    d.address ? 'ADR;TYPE=WORK:;;' + d.address : '',
    d.website ? 'URL:' + d.website : '',
    photoData ? `PHOTO;ENCODING=b;TYPE=${photoType}:${photoData}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n');
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (d.name || 'contact').replace(/\s+/g, '_') + '.vcf';
  a.click();
}

    } else {
      alert('Tap the menu (⋮) in your browser, then tap "Add to Home Screen" or "Install App"');

  }
}

          ${ex.address ? `<a href="https://maps.google.com/?q=${encodeURIComponent(ex.address)}" style="text-align:center;text-decoration:none;color:var(--text)">` : '<div style="text-align:center">'}<div style="width:40px;height:40px;border-radius:50%;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:16px">📍</div><div style="font-size:9px;color:var(--text2);margin-top:2px">Map</div>${ex.address ? '</a>' : '</div>'}
        </div>` : ''}
        ${ex.details ? `<div style="margin-bottom:12px;padding:0 4px">${ex.details.map(d => `<div style="font-size:12px;color:var(--text2);margin-bottom:4px">${d}</div>`).join('')}</div>` : ''}
        ${ex.offer ? `<div style="background:${ex.color}15;border:1px solid ${ex.color}33;border-radius:12px;padding:14px;text-align:center;margin-bottom:12px">
          <div style="font-size:14px;font-weight:800;color:${ex.color}">🎁 ${ex.offer} ⚡</div>
        </div>` : ''}
        ${ex.links && ex.links.length ? `<div style="margin-bottom:12px">
          ${ex.links.map(l => `<a href="${l.url}" target="_blank" style="display:block;padding:10px 14px;background:${ex.color}22;border:1px solid ${ex.color}33;border-radius:10px;margin-bottom:4px;font-size:13px;font-weight:600;color:${ex.color};text-decoration:none;text-align:center">${l.label}</a>`).join('')}
        </div>` : ''}
        ${ex.socials.length ? `<div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">📱 FOLLOW</div>
          ${ex.socials.map(s => `<a href="${s.url}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card2);border-radius:8px;margin-bottom:4px;font-size:12px;color:var(--text2);text-decoration:none">${socialIcons[s.name.toLowerCase()]||'🔗'} ${s.name}</a>`).join('')}
        </div>` : ''}
        ${ex.reviews.length ? `<div>
          <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">⭐ REVIEWS</div>
          ${ex.reviews.map(r => `<a href="${r.url}" target="_blank" style="display:block;padding:8px 12px;background:var(--card2);border-radius:8px;margin-bottom:4px;font-size:12px;color:var(--text2);text-decoration:none">${r.name}</a>`).join('')}
        </div>` : ''}
        ${ex.shopItems && ex.shopItems.length ? `<div style="margin-top:12px">
          <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">🛒 Services & Pricing</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            ${ex.shopItems.map(item => `
              <div style="background:var(--card2);border-radius:12px;overflow:hidden">
                <img src="${item.img}" alt="${item.name}" style="width:100%;height:90px;object-fit:cover;display:block" loading="lazy" onerror="this.style.display='none'">
                <div style="padding:8px 10px">
                  <div style="font-size:12px;font-weight:700;color:var(--text);line-height:1.3">${item.name}</div>
                  <div style="font-size:10px;color:var(--text3);margin-top:2px">${item.desc}</div>
                  <div style="font-size:12px;font-weight:800;color:${ex.color};margin-top:5px">${item.price}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>` : ''}
        <div style="text-align:center;margin-top:12px;font-size:10px;color:#333">⚡ Powered by AutoRepHero</div>
      </div>
    `;
  });

  html += `</div><div style="text-align:center;padding:0 0 24px"><div style="font-size:11px;color:var(--text3)">← Swipe to browse →</div></div>`;
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}

// ===== GOOGLE PLACES SEARCH =====
let searchTimeout;
function searchBiz(q) {
  const sr = document.getElementById('searchResults');
  if (!sr || q.length < 3) { if(sr) { sr.style.display='none'; sr.innerHTML=''; } return; }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    fetch('/api/places?q=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => {
        if (data.predictions && data.predictions.length > 0) {
          sr.innerHTML = data.predictions.slice(0,5).map(p =>
            `<div style="padding:12px 16px;cursor:pointer;border-bottom:1px solid #222" onclick="selectPlace('${p.place_id}')" onmouseover="this.style.background='#252525'" onmouseout="this.style.background='transparent'">
              <div style="font-size:14px;font-weight:600;color:var(--text)">${p.structured_formatting.main_text}</div>
              <div style="font-size:11px;color:var(--text3)">${p.structured_formatting.secondary_text || ''}</div>
            </div>`
          ).join('');
          sr.style.display = 'block';
        } else { sr.style.display = 'none'; }
      }).catch(() => { sr.style.display = 'none'; });
  }, 300);
}

function selectPlace(placeId) {
  const sr = document.getElementById('searchResults');
  if (sr) sr.style.display = 'none';
  fetch('/api/places?placeId=' + placeId)
    .then(r => r.json())
    .then(data => {
      if (data.result) {
        const r = data.result;
        S.data.name = r.name || '';
        S.data.address = r.formatted_address || '';
        S.data.phone = r.formatted_phone_number || '';
        S.data.website = r.website || '';
        const city = (r.address_components || []).find(c => c.types.includes('locality'));
        const state = (r.address_components || []).find(c => c.types.includes('administrative_area_level_1'));
        if (city && state) S.data.tagline = city.long_name + ', ' + state.short_name;
        render();
        S.step = 0; // keep card section open
        render();
      }
    }).catch(e => console.error('Place details error:', e));
}

// ===== INIT =====
render();
</script>
